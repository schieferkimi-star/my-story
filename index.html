<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>My Story</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@200;300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1625;
    --cream: #f5f0e8;
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --mist: #8b7fa8;
    --deep: #0d0a18;
    --glow: rgba(201, 169, 110, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--cream);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated starfield background */
  .cosmos {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse at 30% 20%, #1e1535 0%, #0d0a18 50%, #050310 100%);
    overflow: hidden;
  }

  .cosmos::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 38% 48%, rgba(201,169,110,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 78% 68%, rgba(201,169,110,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 45%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 93% 82%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 5%, rgba(255,255,255,0.5) 0%, transparent 100%);
    animation: twinkle 6s ease-in-out infinite alternate;
  }

  .cosmos::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 60% 80%, rgba(139,127,168,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 70%, rgba(201,169,110,0.08) 0%, transparent 50%);
  }

  @keyframes twinkle {
    0% { opacity: 0.7; }
    100% { opacity: 1; }
  }

  /* Main container */
  .app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.5rem 3rem;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 1s ease both;
  }

  .header-eyebrow {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 200;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    opacity: 0.8;
  }

  .header h1 {
    font-size: 2.4rem;
    font-weight: 300;
    font-style: italic;
    color: var(--cream);
    line-height: 1.1;
    text-shadow: 0 0 40px rgba(201,169,110,0.3);
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1rem auto 0;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Screen management */
  .screen { display: none; width: 100%; max-width: 480px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* Setup screen */
  .setup-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 16px;
    padding: 2rem 1.75rem;
    width: 100%;
    backdrop-filter: blur(10px);
    animation: fadeUp 0.8s ease both 0.3s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .setup-intro {
    font-size: 1.05rem;
    font-style: italic;
    color: rgba(245,240,232,0.7);
    line-height: 1.7;
    margin-bottom: 2rem;
    text-align: center;
  }

  .field-label {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 300;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
    display: block;
  }

  input[type="text"], textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,169,110,0.25);
    border-radius: 8px;
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
    margin-bottom: 1.5rem;
    -webkit-appearance: none;
  }

  input[type="text"]:focus, textarea:focus {
    border-color: rgba(201,169,110,0.6);
    background: rgba(255,255,255,0.08);
  }

  textarea {
    resize: none;
    height: 130px;
    line-height: 1.6;
  }

  input::placeholder, textarea::placeholder {
    color: rgba(245,240,232,0.3);
    font-style: italic;
  }

  .goal-hint {
    font-size: 0.82rem;
    color: rgba(245,240,232,0.4);
    font-style: italic;
    margin-top: -1.1rem;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }

  /* Buttons */
  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, rgba(201,169,110,0.2), rgba(201,169,110,0.1));
    border: 1px solid rgba(201,169,110,0.5);
    border-radius: 50px;
    color: var(--gold-light);
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 300;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 1rem 2rem;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(201,169,110,0.15), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-primary:hover::before, .btn-primary:active::before { opacity: 1; }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    background: transparent;
    border: none;
    color: rgba(245,240,232,0.4);
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 200;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 1rem;
    padding: 0.5rem;
    transition: color 0.3s;
  }
  .btn-secondary:hover { color: rgba(245,240,232,0.7); }

  /* Story screen */
  .date-stamp {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 200;
    font-size: 0.62rem;
    letter-spacing: 0.3em;
    color: var(--mist);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    opacity: 0.7;
    animation: fadeUp 0.6s ease both;
  }

  .story-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,169,110,0.15);
    border-radius: 16px;
    padding: 2rem 1.75rem;
    width: 100%;
    backdrop-filter: blur(10px);
    position: relative;
    animation: fadeUp 0.8s ease both 0.2s;
  }

  .story-card::before {
    content: '✦';
    position: absolute;
    top: -0.6rem;
    left: 50%;
    transform: translateX(-50%);
    color: var(--gold);
    font-size: 0.8rem;
    background: var(--deep);
    padding: 0 0.5rem;
  }

  .story-text {
    font-size: 1.08rem;
    line-height: 1.85;
    color: rgba(245,240,232,0.9);
    font-weight: 300;
    white-space: pre-wrap;
    min-height: 120px;
  }

  .story-text.loading {
    color: rgba(245,240,232,0.4);
    font-style: italic;
  }

  /* Loading shimmer */
  .shimmer-line {
    height: 1em;
    border-radius: 4px;
    background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    margin-bottom: 0.8em;
  }
  .shimmer-line:last-child { width: 60%; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Controls */
  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    margin-top: 2rem;
    width: 100%;
    animation: fadeUp 0.8s ease both 0.4s;
  }

  .play-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(201,169,110,0.25), rgba(201,169,110,0.1));
    border: 1px solid rgba(201,169,110,0.45);
    color: var(--gold-light);
    font-size: 1.4rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(201,169,110,0.1);
  }

  .play-btn:hover { box-shadow: 0 0 40px rgba(201,169,110,0.2); transform: scale(1.05); }
  .play-btn:active { transform: scale(0.97); }
  .play-btn.playing { background: linear-gradient(135deg, rgba(201,169,110,0.35), rgba(201,169,110,0.2)); }

  .play-label {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 200;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: rgba(245,240,232,0.4);
    text-transform: uppercase;
  }

  .action-row {
    display: flex;
    gap: 1rem;
    margin-top: 0.5rem;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid rgba(245,240,232,0.12);
    border-radius: 50px;
    color: rgba(245,240,232,0.45);
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 200;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-ghost:hover { border-color: rgba(201,169,110,0.3); color: rgba(245,240,232,0.7); }

  /* Speed control */
  .speed-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.25rem;
  }
  .speed-label {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 200;
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    color: rgba(245,240,232,0.3);
    text-transform: uppercase;
  }
  .speed-btn {
    background: transparent;
    border: 1px solid rgba(245,240,232,0.1);
    border-radius: 4px;
    color: rgba(245,240,232,0.35);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.6rem;
    padding: 0.2rem 0.45rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .speed-btn.active { border-color: rgba(201,169,110,0.4); color: var(--gold); }

  /* Error */
  .error-msg {
    color: rgba(255,150,150,0.7);
    font-size: 0.85rem;
    font-style: italic;
    text-align: center;
    margin-top: 1rem;
    line-height: 1.5;
  }

  /* Greeting */
  .greeting {
    font-size: 1.5rem;
    font-style: italic;
    font-weight: 300;
    color: rgba(245,240,232,0.6);
    text-align: center;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.8s ease both;
  }

  /* Footer */
  .footer-edit {
    margin-top: 2.5rem;
    text-align: center;
    animation: fadeUp 0.8s ease both 0.5s;
  }

  .glow-pulse {
    animation: glowPulse 3s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(201,169,110,0.1); }
    50% { box-shadow: 0 0 40px rgba(201,169,110,0.25); }
  }
</style>
</head>
<body>

<div class="cosmos"></div>

<div class="app">
  <header class="header">
    <div class="header-eyebrow">Your Daily Vision</div>
    <h1>My Story</h1>
    <div class="divider"></div>
  </header>

  <!-- Setup Screen -->
  <div class="screen active" id="setupScreen">
    <div class="setup-card">
      <p class="setup-intro">Every morning, a new story — written just for you, about the life you're creating.</p>

      <label class="field-label" for="nameInput">Your name</label>
      <input type="text" id="nameInput" placeholder="e.g. Sofia" maxlength="40">

      <label class="field-label" for="goalsInput">Your goals & dreams</label>
      <textarea id="goalsInput" placeholder="e.g. I am running my own business, I feel deeply at peace, I am healthy and strong, I wake up every day with purpose..."></textarea>
      <p class="goal-hint">Write them as if they've already happened — this helps the stories feel real.</p>

      <label class="field-label" for="toneInput">Feeling or mood (optional)</label>
      <input type="text" id="toneInput" placeholder="e.g. calm and confident, joyful, grounded" maxlength="80">

      <button class="btn-primary glow-pulse" onclick="saveAndStart()">Begin my journey →</button>
    </div>
  </div>

  <!-- Story Screen -->
  <div class="screen" id="storyScreen">
    <div class="date-stamp" id="dateStamp"></div>
    <div class="greeting" id="greeting"></div>

    <div class="story-card">
      <div class="story-text loading" id="storyText">
        <div class="shimmer-line"></div>
        <div class="shimmer-line"></div>
        <div class="shimmer-line"></div>
        <div class="shimmer-line"></div>
        <div class="shimmer-line" style="width:60%"></div>
      </div>
    </div>

    <div id="errorMsg"></div>

    <div class="controls" id="controls" style="display:none">
      <button class="play-btn" id="playBtn" onclick="toggleSpeak()" title="Listen">
        ▶
      </button>
      <div class="play-label" id="playLabel">Listen</div>

      <div class="speed-row">
        <span class="speed-label">Speed</span>
        <button class="speed-btn active" onclick="setSpeed(0.8, this)">Slow</button>
        <button class="speed-btn" onclick="setSpeed(1, this)">Normal</button>
        <button class="speed-btn" onclick="setSpeed(1.25, this)">Fast</button>
      </div>

      <div class="action-row">
        <button class="btn-ghost" onclick="generateStory()">New story</button>
        <button class="btn-ghost" onclick="showSetup()">Edit goals</button>
      </div>
    </div>
  </div>
</div>

<script>
  let userData = {};
  let currentStory = '';
  let synth = window.speechSynthesis;
  let utterance = null;
  let isPlaying = false;
  let speechRate = 0.8;

  function loadData() {
    try {
      const saved = localStorage.getItem('myStoryApp');
      if (saved) userData = JSON.parse(saved);
    } catch(e) {}
  }

  function saveData() {
    try { localStorage.setItem('myStoryApp', JSON.stringify(userData)); } catch(e) {}
  }

  function getGreeting(name) {
    const h = new Date().getHours();
    const time = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    return `${time}, ${name}.`;
  }

  function formatDate() {
    return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }

  function showSetup() {
    stopSpeak();
    document.getElementById('setupScreen').classList.add('active');
    document.getElementById('storyScreen').classList.remove('active');
    if (userData.name) document.getElementById('nameInput').value = userData.name;
    if (userData.goals) document.getElementById('goalsInput').value = userData.goals;
    if (userData.tone) document.getElementById('toneInput').value = userData.tone;
  }

  function showStory() {
    document.getElementById('setupScreen').classList.remove('active');
    document.getElementById('storyScreen').classList.add('active');
    document.getElementById('dateStamp').textContent = formatDate();
    document.getElementById('greeting').textContent = getGreeting(userData.name);
  }

  function saveAndStart() {
    const name = document.getElementById('nameInput').value.trim();
    const goals = document.getElementById('goalsInput').value.trim();
    if (!name) { alert('Please enter your name.'); return; }
    if (!goals) { alert('Please enter at least one goal or dream.'); return; }
    userData = { name, goals, tone: document.getElementById('toneInput').value.trim() };
    saveData();
    showStory();
    generateStory();
  }

  async function generateStory() {
    stopSpeak();
    document.getElementById('controls').style.display = 'none';
    document.getElementById('errorMsg').innerHTML = '';
    document.getElementById('storyText').className = 'story-text loading';
    document.getElementById('storyText').innerHTML = `
      <div class="shimmer-line"></div>
      <div class="shimmer-line"></div>
      <div class="shimmer-line"></div>
      <div class="shimmer-line"></div>
      <div class="shimmer-line" style="width:60%"></div>`;

    const toneNote = userData.tone ? `The tone should feel ${userData.tone}.` : 'The tone should feel calm, warm, and deeply affirming.';

    const prompt = `You are writing a short first-person manifestation visualization story for ${userData.name}. 

The story should be vivid, sensory, and emotionally resonant — written as if ${userData.name} is already living their dream life right now, in this moment.

Their goals and dreams: ${userData.goals}

Instructions:
- Write entirely in first person ("I feel...", "I am...", "I walk into...")
- Make it feel like a real, lived moment — not a list of affirmations
- Include sensory details: what I see, feel, hear, smell
- Length: 5–8 sentences, flowing and poetic
- Do NOT use the name "${userData.name}" in the story — write as pure first-person
- ${toneNote}
- Do not include any title, preamble, or explanation. Just the story itself.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": "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", "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      if (!response.ok) throw new Error('API error');
      const data = await response.json();
      currentStory = data.content.map(b => b.text || '').join('').trim();

      document.getElementById('storyText').className = 'story-text';
      document.getElementById('storyText').textContent = currentStory;
      document.getElementById('controls').style.display = 'flex';

    } catch(e) {
      document.getElementById('storyText').className = 'story-text';
      document.getElementById('storyText').innerHTML = '';
      document.getElementById('errorMsg').innerHTML = `<p class="error-msg">Something went quiet... please try again in a moment.</p>
        <div style="text-align:center;margin-top:1rem"><button class="btn-ghost" onclick="generateStory()">Try again</button></div>`;
    }
  }

  function toggleSpeak() {
    if (isPlaying) { stopSpeak(); return; }
    if (!currentStory) return;
    synth.cancel();
    utterance = new SpeechSynthesisUtterance(currentStory);
    utterance.rate = speechRate;
    utterance.pitch = 0.95;

    // Try to pick a gentle female voice if available
    const voices = synth.getVoices();
    const preferred = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female'))
      || voices.find(v => v.lang.startsWith('en') && (v.name.includes('Samantha') || v.name.includes('Karen') || v.name.includes('Victoria')))
      || voices.find(v => v.lang.startsWith('en'));
    if (preferred) utterance.voice = preferred;

    utterance.onstart = () => {
      isPlaying = true;
      document.getElementById('playBtn').innerHTML = '⏸';
      document.getElementById('playBtn').classList.add('playing');
      document.getElementById('playLabel').textContent = 'Pause';
    };
    utterance.onend = utterance.onerror = () => {
      isPlaying = false;
      document.getElementById('playBtn').innerHTML = '▶';
      document.getElementById('playBtn').classList.remove('playing');
      document.getElementById('playLabel').textContent = 'Listen';
    };
    synth.speak(utterance);
  }

  function stopSpeak() {
    synth.cancel();
    isPlaying = false;
    const btn = document.getElementById('playBtn');
    if (btn) { btn.innerHTML = '▶'; btn.classList.remove('playing'); }
    const lbl = document.getElementById('playLabel');
    if (lbl) lbl.textContent = 'Listen';
  }

  function setSpeed(rate, el) {
    speechRate = rate;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    if (isPlaying) { stopSpeak(); toggleSpeak(); }
  }

  // Init
  loadData();
  if (userData.name && userData.goals) {
    showStory();
    generateStory();
  }

  // Reload voices after they load async
  synth.onvoiceschanged = () => {};
</script>
</body>
</html>
